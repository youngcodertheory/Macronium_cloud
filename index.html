<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macronium Cloud | 128 GB Secure Storage</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --accent: #0078d4;
            --bg: #f8fafc;
            --text: #0f172a;
            --danger: #f43f5e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        /* --- LOGO STYLE --- */
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-mark {
            background: var(--accent);
            color: white;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.2);
        }

        .brand-name {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
        }

        /* --- AUTH SCREEN --- */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-card {
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
            width: 380px;
            text-align: center;
        }

        /* --- DASHBOARD --- */
        #app-container {
            display: none;
        }

        header {
            height: 70px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .storage-status {
            width: 220px;
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 6px;
        }

        #quota-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 1s ease;
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .file-card {
            background: white;
            padding: 20px;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
            text-align: center;
        }

        .file-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.03);
        }

        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-outline {
            background: white;
            border: 1px solid #e2e8f0;
        }

        .btn-danger {
            color: var(--danger);
            background: #fff1f2;
        }

        .google-btn {
            width: 100%;
            margin-top: 15px;
            background: white;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            outline: none;
        }
    </style>
</head>

<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <div class="brand" style="justify-content: center; margin-bottom: 10px;">
                <div class="logo-mark">M</div>
                <div class="brand-name">Macronium <span style="color:var(--accent)">Cloud</span></div>
            </div>
            <p style="margin-bottom: 25px; color: #64748b; font-size: 0.85rem;">Access your 128 GB Vault</p>

            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button class="btn btn-primary" style="width: 100%" onclick="handleEmailAuth()">Sign In</button>

            <div style="margin: 20px 0; color: #e2e8f0; font-size: 0.7rem; font-weight: 800;">OAUTH ACCESS</div>

            <button class="google-btn" onclick="signInWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="16"> Sign in with
                Google
            </button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <div class="brand">
                <div class="logo-mark">M</div>
                <div class="brand-name">Macronium <span style="font-weight:300">Cloud</span></div>
            </div>

            <div style="display: flex; align-items: center; gap: 25px;">
                <div class="storage-status">
                    <div id="quota-text" style="font-size: 0.7rem; font-weight: 700; color: #64748b;">0 GB / 128 GB
                    </div>
                    <div class="progress-track">
                        <div id="quota-fill"></div>
                    </div>
                </div>

                <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">+ Upload
                    File</button>
                <input type="file" id="file-input" class="hidden" onchange="uploadFile(event)">
                <button class="btn btn-outline" onclick="signOut()">Logout</button>
            </div>
        </header>

        <div id="file-explorer" class="file-grid"></div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SB_URL = "https://bduqzgrnifdrcpzrpspb.supabase.co";
        const SB_KEY = "sb_publishable_qPfYqHJO0n8r3IIWBJ19pA_x0HaBimk";
        const REDIRECT_URL = window.location.origin + window.location.pathname;

        const client = supabase.createClient(SB_URL, SB_KEY);
        const MAX_QUOTA = 128 * 1024 * 1024 * 1024;

        // --- AUTH ---
        async function signInWithGoogle() {
            await client.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: REDIRECT_URL }
            });
        }

        async function handleEmailAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await client.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
        }

        async function signOut() {
            await client.auth.signOut();
            location.reload();
        }

        client.auth.onAuthStateChange((evt, session) => {
            if (session) {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('app-container').style.display = 'block';
                loadFiles();
            }
        });

        // --- STORAGE ---
        async function uploadFile(e) {
            const file = e.target.files[0];
            const { data: { user } } = await client.auth.getUser();
            if (!file || !user) return;

            const path = `${user.id}/${Date.now()}_${file.name}`;
            const { error: upErr } = await client.storage.from('Macronium').upload(path, file);
            if (upErr) return alert(upErr.message);

            const { data: urlData } = client.storage.from('Macronium').getPublicUrl(path);

            await client.from('files').insert([{
                name: file.name,
                url: urlData.publicUrl,
                file_size: file.size,
                owner_id: user.id
            }]);

            loadFiles();
        }

        async function loadFiles() {
            const { data: files } = await client.from('files').select('*').eq('is_trashed', false).order('created_at', { ascending: false });
            const grid = document.getElementById('file-explorer');
            grid.innerHTML = '';

            let used = 0;
            files?.forEach(f => {
                used += f.file_size;
                grid.innerHTML += `
                    <div class="file-card">
                        <div style="font-size: 2.2rem; margin-bottom: 10px;">📄</div>
                        <div style="font-weight: 700; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${f.name}</div>
                        <div style="color: #94a3b8; font-size: 0.7rem; margin-bottom: 12px;">${(f.file_size / 1024 / 1024).toFixed(1)} MB</div>
                        <div style="display: flex; gap: 5px;">
                            <button class="btn btn-outline" style="flex:1" onclick="window.open('${f.url}', '_blank')">View</button>
                            <button class="btn btn-danger" onclick="trash('${f.id}')">🗑️</button>
                        </div>
                    </div>`;
            });

            const gbUsed = (used / (1024 ** 3)).toFixed(2);
            document.getElementById('quota-text').innerText = `${gbUsed} GB / 128 GB`;
            document.getElementById('quota-fill').style.width = `${(used / MAX_QUOTA) * 100}%`;
        }

        async function trash(id) {
            await client.from('files').update({ is_trashed: true }).eq('id', id);
            loadFiles();
        }
    </script>
</body>

</html>
